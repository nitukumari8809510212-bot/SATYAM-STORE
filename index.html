<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satyam Store</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin-left:20px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
color:#f4c542;
}

.hero{
background:url("https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da");
background-size:cover;
color:white;
text-align:center;
padding:120px 20px;
}

.hero h2{
font-size:45px;
}

.hero button{
padding:12px 25px;
font-size:18px;
border:none;
background:#f4c542;
cursor:pointer;
margin-top:15px;
}

.products{
padding:40px;
text-align:center;
}

.products h2{
margin-bottom:30px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:8px;
}

.card h3{
margin:10px 0;
}

.card button{
background:black;
color:white;
border:none;
padding:10px;
cursor:pointer;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<h1>SATYAM STORE</h1>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h2>Welcome to Satyam Store</h2>
<p>Best deals on amazing products</p>
<button>Shop Now</button>

</section>

<section class="products">

<h2>Our Products</h2>

<div class="product-grid">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Product 1</h3>
<p>₹199</p>
<button>Buy</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Product 2</h3>
<p>₹299</p>
<button>Buy</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Product 3</h3>
<p>₹399</p>
<button>Buy</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Product 4</h3>
<p>₹499</p>
<button>Buy</button>
</div>

</div>

</section>

<footer>
<p>© 2026 Satyam Store | All Rights Reserved</p>
</footer>

</body>
</html>
